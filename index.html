
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Formula Racing 1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;900&family=Roboto:wght@400;700&family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-main: #08080c;
        --bg-panel: rgba(22, 22, 34, 0.7);
        --text-primary: #f8fafc;
        --text-secondary: #94a3b8;
        --accent-red: #e10600;
        --accent-green: #00ff85;
        --border-color: rgba(255, 255, 255, 0.1);
        --main-font: 'Exo 2', sans-serif;
      }
      
      body, html {
        height: 100vh;
        height: -webkit-fill-available;
        overflow: hidden;
        margin: 0;
        padding: 0;
        background-color: var(--bg-main);
      }

      body {
        font-family: var(--main-font);
        color: var(--text-primary);
        background-image: 
          radial-gradient(at 0% 0%, hsla(253,16%,12%,1) 0, transparent 50%), 
          radial-gradient(at 100% 0%, hsla(225,39%,20%,0.3) 0, transparent 50%),
          url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 40 L40 0 L40 1 L1 40 Z' fill='%23ffffff' fill-opacity='0.02'/%3E%3C/svg%3E");
      }

      #root {
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      
      ::-webkit-scrollbar {
        width: 3px;
        height: 3px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.2);
      }

      .glass {
        background: var(--bg-panel);
        backdrop-filter: blur(16px);
        border: 1px solid var(--border-color);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
      }

      .carbon-pattern {
        background-image: 
          linear-gradient(45deg, rgba(0,0,0,0.1) 25%, transparent 25%), 
          linear-gradient(-45deg, rgba(0,0,0,0.1) 25%, transparent 25%), 
          linear-gradient(45deg, transparent 75%, rgba(0,0,0,0.1) 75%), 
          linear-gradient(-45deg, transparent 75%, rgba(0,0,0,0.1) 75%);
        background-size: 4px 4px;
      }

      .animate-fade-in {
        animation: fadeIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .font-racing { font-family: 'Orbitron', sans-serif; }
      .font-mono-racing { font-family: 'JetBrains Mono', monospace; }
      
      .stagger-1 { animation-delay: 50ms; }
      .stagger-2 { animation-delay: 100ms; }
      .stagger-3 { animation-delay: 150ms; }

      @keyframes podium-pop-in {
        0% { transform: translateY(30px) scale(0.9); opacity: 0; }
        100% { transform: translateY(0) scale(1); opacity: 1; }
      }
      .animate-podium-pop-in {
        animation: podium-pop-in 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }
      
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
